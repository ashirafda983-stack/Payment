<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeoXtream | Content Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050810; --card: #0f141e; --accent: #00a8ff; --danger: #e74c3c; --success: #22c55e; --text-dim: #888; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); margin-top: 5px; }

        .table-container { overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #1a202c; padding: 12px; text-align: left; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .movie-info { display: flex; align-items: center; gap: 12px; }
        .movie-info img { width: 35px; height: 50px; border-radius: 6px; object-fit: cover; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .badge-movie { background: rgba(0, 168, 255, 0.15); color: var(--accent); }
        .badge-series { background: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .actions { display: flex; gap: 10px; }
        .btn-action { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-edit { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .btn-delete { background: rgba(231, 76, 60, 0.1); color: var(--danger); }

        #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: var(--card); width: 100%; max-width: 550px; padding: 20px; border-radius: 20px; border: 1px solid #2d3748; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .modal-content label { display: block; margin: 15px 0 6px; font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; background: #050810; border: 1px solid #2d3748; color: white; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }

        .season-box { background: #0a0f18; padding: 10px; border-radius: 12px; border: 1px solid #1a202c; margin-top: 15px; }
        .ep-list-container { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .ep-item { background: #0d121b; padding: 12px; border-radius: 12px; border: 1px solid #1a202c; border-left: 4px solid var(--accent); }
        .ep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ep-title { font-size: 12px; font-weight: 600; color: #eee; }
        
        .modal-btns { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; margin-top: 25px; position: sticky; bottom: 0; background: var(--card); padding-top: 10px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #1a202c; color: white; border: 1px solid #2d3748; padding: 16px; border-radius: 12px; cursor: pointer; }

        #modalLoading { position: absolute; inset: 0; background: var(--card); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 style="color: var(--accent); margin:0;">LEOXTREAM MANAGER</h2>
            <a href="admin.html" class="btn-back" style="background:var(--accent); text-decoration:none; color:white; padding:8px 12px; border-radius:8px; font-size:12px;">+ ADD</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="totalCount">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-val" id="movieCount">0</div><div class="stat-label">Movies</div></div>
            <div class="stat-card"><div class="stat-val" id="seriesCount">0</div><div class="stat-label">Series</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Content</th><th>Type</th><th>Manage</th></tr>
                </thead>
                <tbody id="contentTable"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <div id="modalLoading" style="display:none;"><i class="fas fa-sync fa-spin fa-2x" style="color:var(--accent);"></i></div>

            <div id="modalForm">
                <h3 style="margin-top:0; color:var(--accent);">Update Content</h3>
                <input type="hidden" id="editDocId">
                <label>Title</label><input type="text" id="editTitle">
                <label>VJ Name</label><input type="text" id="editVj">
                <label>Poster URL</label><input type="text" id="editPoster">

                <div id="movieSection">
                    <label>Video Link</label><input type="text" id="editMovieLink">
                </div>

                <div id="seriesSection" style="display:none;">
                    <div class="season-box">
                        <label style="margin:0; color:#fff;">Available Seasons</label>
                        <select id="seasonSelect" onchange="renderFirestoreEpisodes()"></select>
                    </div>
                    <div id="epList" class="ep-list-container"></div>
                </div>

                <div class="modal-btns">
                    <button class="btn-save" id="saveBtn" onclick="updateContent()">SAVE CHANGES</button>
                    <button class="btn-cancel" onclick="closeModal()">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBW6mwoDVbGn0cX7ySV49648jSrLZ_vyEQ", 
        authDomain: "leoxtream-46cdf.firebaseapp.com", 
        projectId: "leoxtream-46cdf", 
        appId: "1:198227069591:web:a86310e5dc58b845abf7d2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allSeriesData = []; 

    function loadContent() {
        db.collection("movies").orderBy("timestamp", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('contentTable');
            tbody.innerHTML = '';
            let t=0, m=0, s=0;
            
            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                t++;
                if(data.type === 'Movie') m++; else s++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><div class="movie-info"><img src="${data.poster}"><b>${data.title}</b></div></td>
                    <td><span class="badge ${data.type === 'Movie' ? 'badge-movie' : 'badge-series'}">${data.type}</span></td>
                    <td><div class="actions">
                        <button class="btn-action btn-edit" onclick='openModal("${id}", ${JSON.stringify(data).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i></button>
                        <button class="btn-action btn-delete" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i></button>
                    </div></td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('totalCount').innerText = t;
            document.getElementById('movieCount').innerText = m;
            document.getElementById('seriesCount').innerText = s;
        });
    }

    async function openModal(id, data) {
        document.getElementById('editModal').style.display = 'flex';
        document.getElementById('modalLoading').style.display = 'flex';
        document.getElementById('modalForm').style.display = 'none';

        document.getElementById('editDocId').value = id;
        document.getElementById('editTitle').value = data.title || "";
        document.getElementById('editVj').value = data.vj || "";
        document.getElementById('editPoster').value = data.poster || "";

        if(data.type === 'Movie') {
            document.getElementById('movieSection').style.display = 'block';
            document.getElementById('seriesSection').style.display = 'none';
            document.getElementById('editMovieLink').value = data.link || data.videoUrl || "";
            showForm();
        } else {
            document.getElementById('movieSection').style.display = 'none';
            document.getElementById('seriesSection').style.display = 'block';
            await fetchFirestoreSeriesData(data.title);
        }
    }

    async function fetchFirestoreSeriesData(title) {
        // Fetch all documents with this title to get all uploaded seasons
        const snap = await db.collection("movies").where("title", "==", title).get();
        allSeriesData = [];
        const seasonSelect = document.getElementById('seasonSelect');
        seasonSelect.innerHTML = '';

        snap.forEach(doc => {
            const d = doc.data();
            allSeriesData.push({ id: doc.id, ...d });
            const opt = document.createElement('option');
            opt.value = doc.id;
            opt.innerText = `Season ${d.seasonNumber || 1}`;
            seasonSelect.appendChild(opt);
        });

        renderFirestoreEpisodes();
        showForm();
    }

    function renderFirestoreEpisodes() {
        const docId = document.getElementById('seasonSelect').value;
        const currentSeason = allSeriesData.find(s => s.id === docId);
        const epContainer = document.getElementById('epList');
        epContainer.innerHTML = '';

        if(currentSeason) {
            let eps = typeof currentSeason.Episodes === 'string' ? JSON.parse(currentSeason.Episodes) : (currentSeason.Episodes || []);
            eps.forEach((ep, i) => {
                const div = document.createElement('div');
                div.className = 'ep-item';
                div.innerHTML = `
                    <div class="ep-header"><span class="ep-title">${ep.title}</span></div>
                    <input type="text" class="ep-input" data-title="${ep.title}" data-poster="${ep.poster}" value="${ep.link}">
                `;
                epContainer.appendChild(div);
            });
        }
    }

    function showForm() {
        document.getElementById('modalLoading').style.display = 'none';
        document.getElementById('modalForm').style.display = 'block';
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function updateContent() {
        const id = document.getElementById('editDocId').value;
        const btn = document.getElementById('saveBtn');
        btn.innerText = "UPDATING...";
        
        const updateData = {
            title: document.getElementById('editTitle').value,
            vj: document.getElementById('editVj').value,
            poster: document.getElementById('editPoster').value
        };

        const type = allSeriesData.find(x => x.id === id)?.type || (document.getElementById('movieSection').style.display === 'block' ? 'Movie' : 'Series');

        if(type === 'Movie') {
            updateData.link = document.getElementById('editMovieLink').value;
        } else {
            const inputs = document.querySelectorAll('.ep-input');
            let newEps = [];
            inputs.forEach(inp => {
                newEps.push({ title: inp.getAttribute('data-title'), poster: inp.getAttribute('data-poster'), link: inp.value.trim() });
            });
            updateData.Episodes = JSON.stringify(newEps);
        }

        try {
            await db.collection("movies").doc(id).update(updateData);
            alert("Updated Successfully!");
            closeModal();
        } catch (e) { alert(e.message); }
        btn.innerText = "SAVE CHANGES";
    }

    async function deleteItem(id) { if(confirm("Delete?")) await db.collection("movies").doc(id).delete(); }

    loadContent();
</script>
</body>
</html>
