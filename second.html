<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeoXtream | Content Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050810; --card: #0f141e; --accent: #00a8ff; --danger: #e74c3c; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; }
        .btn-back { background: #1a202c; color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; border: 1px solid #2d3748; font-size: 14px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #888; margin-top: 5px; }

        .table-container { overflow-x: auto; background: var(--card); border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #1a202c; padding: 12px; text-align: left; font-size: 12px; color: #888; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        
        .movie-info { display: flex; align-items: center; gap: 10px; }
        .movie-info img { width: 35px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .badge-movie { background: rgba(0, 168, 255, 0.1); color: var(--accent); }
        .badge-series { background: rgba(168, 85, 247, 0.1); color: #a855f7; }

        .actions { display: flex; gap: 8px; }
        .btn-action { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-edit { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .btn-delete { background: rgba(231, 76, 60, 0.1); color: var(--danger); }

        #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; border: 1px solid #2d3748; max-height: 90vh; overflow-y: auto; }
        .modal-content label { display: block; margin: 12px 0 4px; font-size: 11px; color: var(--accent); font-weight: bold; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; background: #050810; border: 1px solid #2d3748; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #1a202c; color: white; border: 1px solid #2d3748; padding: 14px; border-radius: 10px; cursor: pointer; }

        .ep-list-container { margin-top: 10px; border-top: 1px solid #2d3748; padding-top: 10px; }
        .ep-item { background: #0a0f18; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #2d3748; transition: 0.3s; }
        .ep-item.has-link { border-left-color: var(--success); }
        .ep-item.no-link { border-left-color: var(--danger); }
        .ep-item b { font-size: 12px; display: block; margin-bottom: 5px; color: #eee; }
        .ep-input { background: #000 !important; border-color: #1a202c !important; }
        
        @media (max-width: 600px) {
            .stats-grid { gap: 5px; }
            .stat-val { font-size: 16px; }
            td, th { padding: 8px; font-size: 11px; }
            .movie-info img { width: 30px; height: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 style="color: var(--accent); margin:0;">LeoXtream</h2>
            <a href="admin.html" class="btn-back"><i class="fas fa-plus"></i> Add New</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="totalCount">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-val" id="movieCount">0</div><div class="stat-label">Movies</div></div>
            <div class="stat-card"><div class="stat-val" id="seriesCount">0</div><div class="stat-label">Series</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Content</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contentTable"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <div id="modalLoading" style="display:none; text-align:center; padding:20px; color:var(--accent);">
                <i class="fas fa-spinner fa-spin"></i> Fetching Episodes...
            </div>
            <div id="modalForm">
                <h3 style="margin-top:0; color:var(--accent);">Update Content</h3>
                <input type="hidden" id="editDocId">
                
                <label>Title</label>
                <input type="text" id="editTitle">
                
                <label>VJ Name</label>
                <input type="text" id="editVj">
                
                <label>Poster URL</label>
                <input type="text" id="editPoster">

                <div id="movieSection">
                    <label>Movie Play Link</label>
                    <input type="text" id="editMovieLink">
                </div>

                <div id="seriesSection" style="display:none;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                        <label style="margin:0;">Episodes List</label>
                        <span id="epCounter" style="font-size:10px; color:#888;"></span>
                    </div>
                    <div id="epList" class="ep-list-container"></div>
                </div>

                <div class="modal-btns">
                    <button class="btn-save" id="saveBtn" onclick="updateContent()">UPDATE</button>
                    <button class="btn-cancel" onclick="closeModal()">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBW6mwoDVbGn0cX7ySV49648jSrLZ_vyEQ", 
        authDomain: "leoxtream-46cdf.firebaseapp.com", 
        projectId: "leoxtream-46cdf", 
        appId: "1:198227069591:web:a86310e5dc58b845abf7d2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const TMDB_KEY = "b3c95973708307223e74360e527f3292";

    let editingType = "";

    function loadContent() {
        db.collection("movies").orderBy("timestamp", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('contentTable');
            tbody.innerHTML = '';
            let t = 0, mCount = 0, sCount = 0;

            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                t++;
                if(data.type === 'Movie') mCount++; else sCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="movie-info">
                            <img src="${data.poster}">
                            <b>${data.title}</b>
                        </div>
                    </td>
                    <td><span class="badge ${data.type === 'Movie' ? 'badge-movie' : 'badge-series'}">${data.type}</span></td>
                    <td>
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick='prepModal("${id}", ${JSON.stringify(data).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i></button>
                            <button class="btn-action btn-delete" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });

            document.getElementById('totalCount').innerText = t;
            document.getElementById('movieCount').innerText = mCount;
            document.getElementById('seriesCount').innerText = sCount;
        });
    }

    async function prepModal(id, data) {
        document.getElementById('editModal').style.display = 'flex';
        document.getElementById('modalForm').style.display = 'none';
        document.getElementById('modalLoading').style.display = 'block';

        editingType = data.type;
        document.getElementById('editDocId').value = id;
        document.getElementById('editTitle').value = data.title || "";
        document.getElementById('editVj').value = data.vj || "";
        document.getElementById('editPoster').value = data.poster || "";
        
        const mSec = document.getElementById('movieSection');
        const sSec = document.getElementById('seriesSection');
        const epContainer = document.getElementById('epList');

        if(data.type === 'Movie') {
            mSec.style.display = 'block';
            sSec.style.display = 'none';
            document.getElementById('editMovieLink').value = data.link || data.movieLink || data.videoUrl || "";
        } else {
            mSec.style.display = 'none';
            sSec.style.display = 'block';
            epContainer.innerHTML = '';
            
            let firebaseEps = [];
            try {
                firebaseEps = typeof data.Episodes === 'string' ? JSON.parse(data.Episodes) : (data.Episodes || []);
            } catch(e) { firebaseEps = []; }

            // TMDB Logic to find missing episodes
            if(data.tmdbId) {
                const season = data.seasonNumber || 1;
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/tv/${data.tmdbId}/season/${season}?api_key=${TMDB_KEY}`);
                    const tmdbData = await res.json();
                    
                    if(tmdbData.episodes) {
                        tmdbData.episodes.forEach(tmdbEp => {
                            const existing = firebaseEps.find(fe => fe.title.includes(`Episode ${tmdbEp.episode_number}`));
                            const link = existing ? existing.link : "";
                            
                            const div = document.createElement('div');
                            div.className = `ep-item ${link ? 'has-link' : 'no-link'}`;
                            div.innerHTML = `
                                <b>Episode ${tmdbEp.episode_number}: ${tmdbEp.name}</b>
                                <input type="text" class="ep-input" data-title="Episode ${tmdbEp.episode_number}" data-poster="${data.poster}" value="${link}" placeholder="Paste link for this episode...">
                            `;
                            epContainer.appendChild(div);
                        });
                        document.getElementById('epCounter').innerText = `${tmdbData.episodes.length} Episodes Total`;
                    }
                } catch(e) {
                    renderFallback(firebaseEps, epContainer);
                }
            } else {
                renderFallback(firebaseEps, epContainer);
            }
        }

        document.getElementById('modalLoading').style.display = 'none';
        document.getElementById('modalForm').style.display = 'block';
    }

    function renderFallback(eps, container) {
        if(eps.length === 0) {
            container.innerHTML = '<div style="color:#e74c3c; font-size:12px; text-align:center;">No TMDB ID found to sync episodes.</div>';
            return;
        }
        eps.forEach((ep, i) => {
            const div = document.createElement('div');
            div.className = 'ep-item has-link';
            div.innerHTML = `<b>${ep.title}</b><input type="text" class="ep-input" data-title="${ep.title}" data-poster="${ep.poster}" value="${ep.link}">`;
            container.appendChild(div);
        });
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    async function updateContent() {
        const id = document.getElementById('editDocId').value;
        const btn = document.getElementById('saveBtn');
        btn.innerText = "UPDATING...";
        btn.disabled = true;

        const updateData = {
            title: document.getElementById('editTitle').value,
            vj: document.getElementById('editVj').value,
            poster: document.getElementById('editPoster').value
        };

        if(editingType === 'Movie') {
            const link = document.getElementById('editMovieLink').value;
            updateData.link = link;
            updateData.movieLink = link;
            updateData.videoUrl = link;
        } else {
            const inputs = document.querySelectorAll('.ep-input');
            let newEps = [];
            inputs.forEach(inp => {
                if(inp.value.trim() !== "") {
                    newEps.push({
                        title: inp.getAttribute('data-title'),
                        poster: inp.getAttribute('data-poster'),
                        link: inp.value.trim()
                    });
                }
            });
            updateData.Episodes = JSON.stringify(newEps);
        }

        try {
            await db.collection("movies").doc(id).update(updateData);
            alert("Database Updated Successfully!");
            closeModal();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "UPDATE";
            btn.disabled = false;
        }
    }

    async function deleteItem(id) {
        if(confirm("Delete permanently?")) {
            await db.collection("movies").doc(id).delete();
        }
    }

    loadContent();
</script>
</body>
</html>
