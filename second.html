<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J MOVIES | Content Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050810; --card: #0f141e; --accent: #00a8ff; --danger: #e74c3c; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back { background: #1a202c; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; border: 1px solid #2d3748; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 24px; font-weight: 900; color: var(--accent); }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #1a202c; padding: 15px; text-align: left; font-size: 14px; color: #888; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .movie-info { display: flex; align-items: center; gap: 15px; }
        .movie-info img { width: 40px; height: 55px; border-radius: 5px; object-fit: cover; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-movie { background: rgba(0, 168, 255, 0.1); color: var(--accent); }
        .badge-series { background: rgba(168, 85, 247, 0.1); color: #a855f7; }

        .actions { display: flex; gap: 10px; }
        .btn-action { width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-edit { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .btn-delete { background: rgba(231, 76, 60, 0.1); color: var(--danger); }
        .btn-edit:hover { background: var(--success); color: white; }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Update Modal Styling */
        #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-content label { display: block; margin: 15px 0 5px; font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; background: #050810; border: 1px solid #2d3748; color: white; border-radius: 8px; box-sizing: border-box; }
        
        .modal-btns { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 25px; position: sticky; bottom: -30px; background: var(--card); padding-top: 10px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .btn-cancel { background: #1a202c; color: white; border: 1px solid #2d3748; padding: 15px; border-radius: 10px; cursor: pointer; }
        
        /* Episode Row Styling */
        .ep-edit-box { background: #161b26; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2d3748; position: relative; display: flex; gap: 10px; align-items: flex-start; }
        .ep-img { width: 60px; height: 80px; border-radius: 5px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .ep-inputs { flex: 1; }
        .ep-inputs input { margin-bottom: 5px; padding: 8px; font-size: 12px; width: 100% !important; }
        .btn-del-ep { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 5px; }
        .btn-add-ep { background: rgba(0, 168, 255, 0.1); color: var(--accent); border: 1px dashed var(--accent); width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 style="color: var(--accent);">Content Manager</h1>
            <a href="admin.html" class="btn-back"><i class="fas fa-plus"></i> Add New</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="totalCount">0</div><div>Total Items</div></div>
            <div class="stat-card"><div class="stat-val" id="movieCount">0</div><div>Movies</div></div>
            <div class="stat-card"><div class="stat-val" id="seriesCount">0</div><div>Series</div></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>CONTENT</th>
                    <th>TYPE</th>
                    <th>VJ NAME</th>
                    <th>DATE ADDED</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="contentTable"></tbody>
        </table>
    </div>

    <div id="editModal">
        <div class="modal-content">
            <h2 style="margin:0; color:var(--accent);">Update Content</h2>
            <input type="hidden" id="editDocId">
            <input type="hidden" id="editType">
            <input type="hidden" id="editTmdbId">
            <input type="hidden" id="editSeasonNum">
            
            <label>Title</label>
            <input type="text" id="editTitle">
            
            <label>VJ Name</label>
            <input type="text" id="editVj">
            
            <label>Overview</label>
            <textarea id="editOverview" rows="4"></textarea>
            
            <label>Poster URL</label>
            <input type="text" id="editPoster">
            
            <label>Banner URL</label>
            <input type="text" id="editBanner">
            
            <div id="movieLinkSection">
                <label>Video Play Link</label>
                <input type="text" id="editLink">
            </div>

            <div id="seriesEpisodesSection" style="display:none; margin-top: 15px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label>Season Episodes</label>
                    <button type="button" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:10px; cursor:pointer;" onclick="fetchFreshTmdbEpisodes()">REFETCH FROM TMDB</button>
                </div>
                <div id="editEpisodesList" style="margin-top:10px;"></div>
                <button type="button" class="btn-add-ep" onclick="addNewEpRow()">+ Add Manual Episode</button>
            </div>

            <div class="modal-btns">
                <button class="btn-save" onclick="updateContent()">SAVE CHANGES</button>
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
            </div>
        </div>
    </div>

<script>
    const tmdbKey = "187498c5388701041b3a16518a211470";
    const firebaseConfig = { 
        apiKey: "AIzaSyBW6mwoDVbGn0cX7ySV49648jSrLZ_vyEQ", 
        authDomain: "leoxtream-46cdf.firebaseapp.com", 
        projectId: "leoxtream-46cdf", 
        appId: "1:198227069591:web:a86310e5dc58b845abf7d2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function loadContent() {
        db.collection("movies").orderBy("timestamp", "desc").onSnapshot(snap => {
            const tbody = document.getElementById('contentTable');
            tbody.innerHTML = '';
            let total = 0, movies = 0, series = 0;

            snap.forEach(doc => {
                const m = doc.data();
                const id = doc.id;
                total++;
                if(m.type === 'Movie') movies++; else series++;

                const date = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleDateString() : '---';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="movie-info">
                            <img src="${m.poster}">
                            <div><b>${m.title}</b></div>
                        </div>
                    </td>
                    <td><span class="badge ${m.type === 'Movie' ? 'badge-movie' : 'badge-series'}">${m.type}</span></td>
                    <td>${m.vj || '---'}</td>
                    <td style="color: #666;">${date}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-action btn-edit" id="btn-edit-${id}"><i class="fas fa-edit"></i></button>
                            <button class="btn-action btn-delete" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
                document.getElementById(`btn-edit-${id}`).onclick = () => openEditModal(id, m);
            });

            document.getElementById('totalCount').innerText = total;
            document.getElementById('movieCount').innerText = movies;
            document.getElementById('seriesCount').innerText = series;
        });
    }

    async function openEditModal(id, data) {
        document.getElementById('editDocId').value = id;
        document.getElementById('editType').value = data.type || "Movie";
        document.getElementById('editTitle').value = data.title || "";
        document.getElementById('editVj').value = data.vj || "";
        document.getElementById('editOverview').value = data.overview || "";
        document.getElementById('editPoster').value = data.poster || "";
        document.getElementById('editBanner').value = data.banner || "";
        document.getElementById('editTmdbId').value = data.tmdbId || "";
        document.getElementById('editSeasonNum').value = data.seasonNumber || "1";
        
        const epList = document.getElementById('editEpisodesList');
        epList.innerHTML = '';

        if (data.type === 'Series') {
            document.getElementById('movieLinkSection').style.display = 'none';
            document.getElementById('seriesEpisodesSection').style.display = 'block';
            
            let eps = [];
            if (data.Episodes) {
                try { eps = JSON.parse(data.Episodes); } catch(e) {}
            }

            // If we have saved episodes, show them. If not, try to fetch from TMDB automatically
            if (eps.length > 0) {
                eps.forEach(ep => addNewEpRow(ep.title, ep.link, ep.size, ep.poster));
            } else if (data.tmdbId) {
                fetchFreshTmdbEpisodes();
            }
        } else {
            document.getElementById('movieLinkSection').style.display = 'block';
            document.getElementById('seriesEpisodesSection').style.display = 'none';
            document.getElementById('editLink').value = data.link || data.movieLink || data.videoUrl || "";
        }

        document.getElementById('editModal').style.display = 'flex';
    }

    async function fetchFreshTmdbEpisodes() {
        const tmdbId = document.getElementById('editTmdbId').value;
        const seasonNum = document.getElementById('editSeasonNum').value;
        const epList = document.getElementById('editEpisodesList');

        if (!tmdbId) {
            alert("No TMDB ID found for this series. Cannot fetch automatically.");
            return;
        }

        epList.innerHTML = '<div style="text-align:center; padding:20px; color:var(--accent);">Fetching from TMDB...</div>';

        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${seasonNum}?api_key=${tmdbKey}`);
            const data = await res.json();
            
            epList.innerHTML = '';
            if (data.episodes) {
                data.episodes.forEach(ep => {
                    const posterPath = ep.still_path ? `https://image.tmdb.org/t/p/w500${ep.still_path}` : document.getElementById('editPoster').value;
                    addNewEpRow(`Episode ${ep.episode_number}: ${ep.name}`, '', '', posterPath);
                });
            } else {
                epList.innerHTML = '<div style="color:var(--danger);">Failed to fetch episodes. Check TMDB ID/Season.</div>';
            }
        } catch (e) {
            alert("TMDB Fetch Error: " + e.message);
        }
    }

    function addNewEpRow(title = '', link = '', size = '', poster = '') {
        const epList = document.getElementById('editEpisodesList');
        const div = document.createElement('div');
        div.className = 'ep-edit-box';
        div.innerHTML = `
            <img src="${poster}" class="ep-img" onerror="this.src='https://via.placeholder.com/60x80?text=No+Img'">
            <div class="ep-inputs">
                <input type="text" class="edit-ep-title" value="${title}" placeholder="Episode Title">
                <input type="text" class="edit-ep-link" value="${link}" placeholder="Paste Link Here">
                <input type="text" class="edit-ep-size" value="${size}" placeholder="Size (e.g. 250MB)">
                <input type="hidden" class="edit-ep-poster" value="${poster}">
            </div>
            <button title="Remove Episode" class="btn-del-ep" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
        `;
        epList.appendChild(div);
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    async function updateContent() {
        const id = document.getElementById('editDocId').value;
        const type = document.getElementById('editType').value;
        const btn = document.querySelector('.btn-save');
        btn.innerText = "UPDATING...";
        btn.disabled = true;

        const updatedData = {
            title: document.getElementById('editTitle').value,
            vj: document.getElementById('editVj').value,
            overview: document.getElementById('editOverview').value,
            poster: document.getElementById('editPoster').value,
            banner: document.getElementById('editBanner').value
        };

        if (type === 'Series') {
            let episodes = [];
            let filledCount = 0;
            document.querySelectorAll('.ep-edit-box').forEach(box => {
                const linkVal = box.querySelector('.edit-ep-link').value;
                if(linkVal.trim() !== "") filledCount++;
                
                episodes.push({
                    title: box.querySelector('.edit-ep-title').value,
                    link: linkVal,
                    size: box.querySelector('.edit-ep-size').value,
                    poster: box.querySelector('.edit-ep-poster').value
                });
            });
            updatedData.Episodes = JSON.stringify(episodes);
            updatedData.totalEpisodes = episodes.length;

            if (episodes.length > filledCount) {
                await db.collection("upcoming_series").doc(id).set({
                    title: updatedData.title,
                    overview: updatedData.overview,
                    poster: updatedData.poster,
                    vjName: updatedData.vj,
                    epFrom: filledCount,
                    epTo: episodes.length,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } else {
                await db.collection("upcoming_series").doc(id).delete().catch(()=>{});
            }
        } else {
            const link = document.getElementById('editLink').value;
            updatedData.link = link;
            updatedData.movieLink = link;
            updatedData.videoUrl = link;
        }

        try {
            await db.collection("movies").doc(id).update(updatedData);
            alert("Updated Successfully!");
            closeModal();
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            btn.innerText = "SAVE CHANGES";
            btn.disabled = false;
        }
    }

    async function deleteItem(id) {
        if(confirm("Confirm deletion? This cannot be undone.")) {
            await db.collection("movies").doc(id).delete();
            await db.collection("upcoming_series").doc(id).delete().catch(()=>{});
        }
    }

    loadContent();
</script>
</body>
</html>
