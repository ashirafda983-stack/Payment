<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J MOVIES - Download App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #050508;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* --- ADVANCED BACKGROUND GLOWS --- */
        .glow-orb-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: float 12s infinite alternate ease-in-out;
        }

        .glow-orb-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: floatReverse 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        @keyframes floatReverse {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100px, -80px); }
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 8, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 120px 5% 50px;
            text-align: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- PILL STYLE BUTTON --- */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            color: #000;
            text-decoration: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 50px; /* Pill style */
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5);
        }

        .download-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .download-btn svg {
            margin-right: 10px;
            width: 24px;
            height: 24px;
        }

        /* --- SCREENSHOTS SHOWCASE --- */
        .showcase {
            padding: 50px 5%;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 100px;
        }

        .phone-mockup {
            width: 280px;
            height: 600px;
            border-radius: 40px;
            background: var(--glass-bg);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
        }

        .phone-mockup:hover {
            transform: translateY(-15px);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            object-fit: cover;
            background-color: #111;
        }

        /* --- FEATURES --- */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .feature-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 50px; /* Pill style */
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            .glass-panel { padding: 30px 20px; }
            .phone-mockup { width: 240px; height: 514px; }
        }
    </style>
</head>
<body>

    <div class="glow-orb-1"></div>
    <div class="glow-orb-2"></div>

    <nav>
        <div class="brand-logo">J MOVIES</div>
    </nav>

    <section class="hero">
        <div class="glass-panel">
            <h1>The Ultimate Streaming Experience</h1>
            <p class="subtitle">Dive into endless entertainment. Access the latest blockbusters, series, and exclusive VJ translated content right from your pocket. High definition, no interruptions.</p>
            
            <a href="https://github.com/ashirafda983-stack/Payment/raw/refs/heads/main/MovieXtream_1.0.1.apk" class="download-btn">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download APK v1.0.1
            </a>

            <div class="features">
                <div class="feature-pill">VJ Translations</div>
                <div class="feature-pill">Offline Downloads</div>
                <div class="feature-pill">HD Streaming</div>
            </div>
        </div>
    </section>

    <section class="showcase">
        <div class="phone-mockup">
            <img src="screen1.jpg" alt="Home Screen" class="phone-screen">
        </div>
        <div class="phone-mockup">
            <img src="screen2.jpg" alt="Movie Details" class="phone-screen">
        </div>
        <div class="phone-mockup">
            <img src="screen3.jpg" alt="Latest Uploads" class="phone-screen">
        </div>
    </section>

</body>
  </html>
