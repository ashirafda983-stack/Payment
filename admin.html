        :root { --bg: #050810; --card: #0f141e; --accent: #00a8ff; --vj-green: #22c55e; --danger: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 10px; background: #1a202c; border: 2px solid #2d3748; color: #888; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }
        .type-btn.active { border-color: var(--accent); color: white; background: rgba(0, 168, 255, 0.1); }
        input, select, textarea { width: 100%; padding: 12px; background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; margin-top: 5px; }
        #searchResults, #oldDbResults { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; display: none; border: 1px solid var(--accent); }
        .res-item { cursor: pointer; text-align: center; background: #161b26; padding: 5px; border-radius: 5px; }
        .res-item img { width: 100%; border-radius: 5px; height: 160px; object-fit: cover; }
        .grid-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; background: #161b26; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .cat-item { font-size: 11px; display: flex; align-items: center; gap: 5px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-primary { background: var(--accent); color: white; font-size: 16px; }
        .movie-item { display: flex; align-items: center; gap: 15px; background: #161b26; padding: 10px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .movie-item img { width: 50px; height: 70px; border-radius: 5px; object-fit: cover; }
        .ep-box { background: #050810; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2d3748; }
        #fullOldDbList { max-height: 500px; overflow-y: auto; padding: 10px; background: #0a0e17; border-radius: 10px; }
        .nav-btn { background: #1a202c; color: var(--accent); border: 1px solid var(--accent); margin-bottom: 20px; width: auto; display: inline-block; padding: 10px 20px; cursor: pointer; }
        .req-item { background: #161b26; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .reseller-item { background: #161b26; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .user-card { background: #1a202c; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--vj-green); }
        .user-info { font-size: 13px; color: #ccc; }
        .user-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-small { padding: 5px 10px; font-size: 11px; width: auto; margin: 0; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>

            function saveDraft() {
        let episodes = [];
        document.querySelectorAll('.ep-link-input').forEach(input => {
            episodes.push({
                title: input.getAttribute('data-title'),
                img: input.getAttribute('data-img'),
                link: input.value
            });
        });
        const draft = {
            title: document.getElementById('title').value,
            overview: document.getElementById('overview').value,
            cast: document.getElementById('cast').value,
            castList: currentCastList,
            vj: document.getElementById('vj').value,
            vj_genre: document.getElementById('vj_genre').value,
            logo: document.getElementById('logo').value,
            trailer: document.getElementById('trailer').value,
            poster: document.getElementById('poster').value,
            banner: document.getElementById('banner').value,
            movieLink: document.getElementById('movieLink').value,
            searchType: searchType,
            isFeatured: document.getElementById('isFeatured').checked,
            episodes: episodes,
            categories: Array.from(document.querySelectorAll('.genre-check:checked')).map(c => c.value)
        };
        localStorage.setItem('leoxtream_admin_backup', JSON.stringify(draft));
    }

    function checkDraft() {
        const saved = localStorage.getItem('leoxtream_admin_backup');
        if(saved) {
            const data = JSON.parse(saved);
            if(data.title || data.movieLink || (data.episodes && data.episodes.length > 0)) {
                if(confirm("You have unsaved progress. Would you like to restore it?")) {
                                setType(data.searchType || 'movie');
                    document.getElementById('title').value = data.title || "";
                    document.getElementById('overview').value = data.overview || "";
                    document.getElementById('cast').value = data.cast || "";
                    currentCastList = data.castList || [];
                    document.getElementById('vj').value = data.vj || "";
                    document.getElementById('vj_genre').value = data.vj_genre || "";
                    document.getElementById('logo').value = data.logo || "";
                    document.getElementById('trailer').value = data.trailer || "";
                    document.getElementById('poster').value = data.poster || "";
                    document.getElementById('banner').value = data.banner || "";
                    document.getElementById('movieLink').value = data.movieLink || "";
                    document.getElementById('isFeatured').checked = data.isFeatured || false;
                    if(data.categories) {
                        data.categories.forEach(cat => {
                            const cb = document.querySelector(`.genre-check[value="${cat}"]`);
                            if(cb) cb.checked = true;
                        });
                    }
                    if(data.searchType === 'tv' && data.episodes) {
                        const epList = document.getElementById('epList');
                        epList.innerHTML = '';
                        data.episodes.forEach(ep => {
                            const div = document.createElement('div');
                            div.className = 'ep-box';
                            div.innerHTML = `
                                <div style="display:flex; gap:10px; align-items:center;">
                                    <img src="${ep.img}" style="width:60px; height:40px; border-radius:4px; object-fit:cover;">
                                    <div style="flex:1;">
                                        <strong>${ep.title}</strong>
                                        <input type="text" class="ep-link-input" data-title="${ep.title}" data-img="${ep.img}" value="${ep.link}" oninput="saveDraft()">
                                    </div>
                                </div>`;
                            epList.appendChild(div);
                        });
                    }
                } else { localStorage.removeItem('leoxtream_admin_backup'); }
            }
        }
    }
                async function searchPearlSource() {
        const query = document.getElementById('tmdbInput').value;
        if (!query) return alert("Please enter a movie name first.");
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<div style="padding:20px; color:var(--accent);">Connecting to Pearl Pix...</div>';
        resultsDiv.style.display = 'block';
        try {
            const proxyUrl = 'https://api.allorigins.win/get?url=';
            const targetUrl = `https://pearlpixug.com/api/v1/movies?search=${encodeURIComponent(query)}`;
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            const data = await response.json();
            const results = JSON.parse(data.contents);
            resultsDiv.innerHTML = '';
            resultsDiv.style.display = 'grid';
            if (results && results.length > 0) {
                results.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'res-item';
                    const imgUrl = m.poster || m.image || 'https://via.placeholder.com/130x160?text=No+Image';
                    div.innerHTML = `<img src="${imgUrl}"><div>${m.title}</div>`;
                    div.onclick = () => {
                        document.getElementById('title').value = m.title;
                        document.getElementById('poster').value = imgUrl;
                        let link = m.play_url || m.download_url || m.link;
                        if(link) link = link.replace('/d/', '/e/').replace('download', 'play');
                        document.getElementById('movieLink').value = link || "";
                        saveDraft();
                        alert("Movie data and Play Link imported successfully!");
                        resultsDiv.style.display = 'none';
                    };
                    resultsDiv.appendChild(div);
                });
            } else {
                resultsDiv.innerHTML = '<div style="padding:20px;">No movies found in Pearl Pix database.</div>';
            }
        } catch (error) {
            resultsDiv.innerHTML = '<div style="padding:20px; color:var(--danger);">Error: Could not reach Pearl Pix source.</div>';
        }
        }
            function loadUsers() {
        db.collection("usernames").orderBy("uid").onSnapshot(snap => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                const userId = doc.id;
                list.innerHTML += `
                    <div class="user-card">
                        <div class="user-info">
                            <b>Name:</b> ${userId} | <b>UID:</b> ${u.uid}<br>
                            <b>Status:</b> <span style="color:${u.isPremium ? 'gold' : '#888'}">${u.isPremium ? 'PREMIUM' : 'FREE'}</span>
                        </div>
                        <div class="user-actions">
                            <button class="btn-small btn-primary" onclick="togglePremium('${userId}', ${u.isPremium})">TOGGLE PREMIUM</button>
                            <button class="btn-small" style="background:var(--danger);" onclick="deleteUser('${userId}')">DELETE</button>
                        </div>
                    </div>`;
            });
        });
    }

    async function togglePremium(id, current) {
        await db.collection("usernames").doc(id).update({ isPremium: !current });
        alert("User Status Updated!");
    }

    async function deleteUser(id) {
        if(confirm("Delete this user permanently?")) await db.collection("usernames").doc(id).delete();
            }
                async function sendNotification() {
        const title = document.getElementById('fcmTitle').value;
        const message = document.getElementById('fcmBody').value;
        if(!title || !message) { alert("Please fill both title and message"); return; }
        
        try {
            await fetch('https://fcm.googleapis.com/fcm/send', {
                method: 'POST',
                headers: {
                    'Authorization': 'key=BEesDIZ35bDpMz6wlrjhPclJNqXrpCDjF4rNSS3ZVmnXy7ovs1cHjGqq3VFzytzihA8YXFj40scCkkH0n7P2Zxg',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    to: '/topics/all_users',
                    priority: 'high',
                    notification: { title: title, body: message, click_action: 'https://leoxtream-46cdf.firebaseapp.com' },
                    data: { title: title, body: message, click_action: 'https://leoxtream-46cdf.firebaseapp.com' }
                })
            });
        } catch(e) { console.error(e); }

        await db.collection("notifications").add({
            title: title,
            message: message,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            status: "unread",
            userId: "all"
        });
        alert("Notification sent!");
        document.getElementById('fcmTitle').value = '';
        document.getElementById('fcmBody').value = '';
    }

    function loadRequests() {
        db.collection("requests").orderBy("timestamp", "desc").limit(15).onSnapshot(snap => {
            const list = document.getElementById('requestList');
            list.innerHTML = '';
            if(snap.empty) { list.innerHTML = 'No pending requests.'; return; }
            snap.forEach(doc => {
                const r = doc.data();
                list.innerHTML += `<div class="req-item"><div><b>${r.movieTitle}</b><br><small>By: ${r.userName || 'User'}</small></div>
                <button onclick="deleteRequest('${doc.id}')" style="width:auto; margin:0; background:var(--danger); padding:5px 10px; font-size:11px;">CLEAR</button></div>`;
            });
        });
    }

    async function deleteRequest(id) {
        if(confirm("Mark this request as done?")) await db.collection("requests").doc(id).delete();
    }

    function toggleResellerSection() {
        const sec = document.getElementById('resellerSection');
        sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
    }

    function addReseller() {
        const u = document.getElementById('resUser').value;
        const p = document.getElementById('resPass').value;
        if(u && p) {
            rtdb.ref('Admins').push({ user: u, pass: p, deviceId: "" });
            alert("Reseller Added");
            document.getElementById('resUser').value = '';
            document.getElementById('resPass').value = '';
        }
    }

    function loadResellers() {
        rtdb.ref('Admins').on('value', snap => {
            const list = document.getElementById('resellerList');
            list.innerHTML = '';
            snap.forEach(c => {
                list.innerHTML += `<div class="reseller-item"><span>${c.val().user}</span>
                <button onclick="rtdb.ref('Admins/${c.key}').remove()" style="width:auto; margin:0; background:red; padding:2px 8px;">X</button></div>`;
            });
        });
    }
                const categories = ["Newly Added", "Top Rated", "Action", "Adventure", "Animations", "Comedy", "Crime", "Drama", "Fantasy", "Horror", "Romance", "Sci-Fi", "TV Show", "Thriller", "Series", "Leo Likes"];

        document.getElementById('typeSeries').classList.toggle('active', t === 'tv');
        document.getElementById('seriesDiv').style.display = t === 'tv' ? 'block' : 'none';
        document.getElementById('movieLinkDiv').style.display = t === 'movie' ? 'block' : 'none';
        loadFullOldDbList();
        saveDraft();
    }

    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('title').value = '';
        document.getElementById('overview').value = '';
        document.getElementById('cast').value = '';
        document.getElementById('vj').value = '';
        document.getElementById('vj_genre').value = '';
        document.getElementById('logo').value = '';
        document.getElementById('trailer').value = '';
        document.getElementById('poster').value = '';
        document.getElementById('banner').value = '';
        document.getElementById('movieLink').value = '';
        document.getElementById('epList').innerHTML = '';
        document.getElementById('isFeatured').checked = false;
        currentCastList = [];
        document.querySelectorAll('.genre-check').forEach(cb => cb.checked = false);
        localStorage.removeItem('leoxtream_admin_backup');
        window.scrollTo({ top: 0, behavior: 'smooth' });
            }
                async function searchTMDB() {
        const query = document.getElementById('tmdbInput').value;
        const res = await fetch(`https://api.themoviedb.org/3/search/${searchType}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = ''; resultsDiv.style.display = 'grid';
        data.results.forEach(m => {
            const div = document.createElement('div'); div.className = 'res-item';
            div.innerHTML = `<img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><div>${m.title || m.name}</div>`;
            div.onclick = () => selectItem(m.id, m);
            resultsDiv.appendChild(div);
        });
    }

    function loadFullOldDbList() {
        const path = searchType === 'movie' ? 'Movies' : 'Series';
        const listDiv = document.getElementById('fullOldDbList');
        listDiv.innerHTML = 'Loading...';
        rtdb.ref(path).on('value', snap => {
            listDiv.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                const title = data.Title || data.title || "No Title";
                const poster = data.Poster || data.poster || "";
                const genre = data.Genre || data.category || data.genre || "No Genre";
                const div = document.createElement('div');
                div.className = 'movie-item';
                div.innerHTML = `<img src="${poster}"><div><b>${title}</b><br><small style="color:var(--accent)">${genre}</small></div>`;
                div.onclick = () => fillFromOldDb(data);
                listDiv.appendChild(div);
            });
        });
    }

    function searchOldDb() {
        const query = document.getElementById('oldDbInput').value.toLowerCase();
        const path = searchType === 'movie' ? 'Movies' : 'Series';
        const resultsDiv = document.getElementById('oldDbResults');
        resultsDiv.style.display = 'grid';
        resultsDiv.innerHTML = '';
        rtdb.ref(path).once('value', snap => {
            snap.forEach(child => {
                const data = child.val();
                const title = data.Title || data.title || "";
                if(title.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = 'res-item';
                    div.innerHTML = `<img src="${data.Poster || data.poster || ''}"><div>${title}</div>`;
                    div.onclick = () => fillFromOldDb(data);
                    resultsDiv.appendChild(div);
                }
            });
        });
    }

    function fillFromOldDb(data) {
        document.getElementById('vj').value = data.vj || "";
        const allGenres = data.vj_genre || data.genre || data.category || data.Genre || "";
        document.getElementById('vj_genre').value = allGenres;
        if(searchType === 'movie') {
            document.getElementById('title').value = data.title || data.Title || "";
            document.getElementById('overview').value = data.overview || data.Overview || "";
            document.getElementById('poster').value = data.poster || data.Poster || "";
            document.getElementById('banner').value = data.banner || data.Banner || data.Backdrop || "";
            document.getElementById('logo').value = data.logo || data.Logo || "";
            document.getElementById('trailer').value = data.trailer || data.Trailer || "";
            document.getElementById('movieLink').value = data.link || data.Link || data.movieLink || data.videoUrl || "";
        } else {
            const epList = document.getElementById('epList');
            epList.innerHTML = 'Searching Episodes...';
            const pushKey = data.PushKey;
            if(pushKey) {
                rtdb.ref('Episodes/' + pushKey).once('value', epSnap => {
                    epList.innerHTML = '';
                    const epData = epSnap.val();
                    if(epData && epData.Episodes) {
                        const seasonNum = prompt("Which Season is this series?", "1") || "1";
                        epData.Episodes.forEach((ep, index) => {
                            const epNum = `S${seasonNum} EPS ${index + 1}`;
                            const div = document.createElement('div'); div.className = 'ep-box';
                            div.innerHTML = `<label>${epNum}</label><input type="text" class="ep-link-input" data-title="${epNum}" data-img="${data.Poster || data.poster || ''}" value="${ep.link}" oninput="saveDraft()">`;
                            epList.appendChild(div);
                        });
                        saveDraft();
                        alert("Links auto-filled successfully!");
                    } else { epList.innerHTML = 'No episodes found.'; }
                });
            }
        }
        document.getElementById('oldDbResults').style.display = 'none';
        saveDraft();
        window.scrollTo({ top: 0, behavior: 'smooth' });
            }
                async function selectItem(id, m) {
        document.getElementById('title').value = m.title || m.name;
        document.getElementById('overview').value = m.overview;
        document.getElementById('poster').value = `https://image.tmdb.org/t/p/w500${m.poster_path}`;
        document.getElementById('banner').value = `https://image.tmdb.org/t/p/original${m.backdrop_path}`;
        document.getElementById('searchResults').style.display = 'none';
        
        const detailRes = await fetch(`https://api.themoviedb.org/3/${searchType}/${id}?api_key=${TMDB_KEY}&append_to_response=videos,credits,images&include_image_language=en`);
        const details = await detailRes.json();
        const logo = details.images.logos.find(l => l.file_path.endsWith('.png'));
        document.getElementById('logo').value = logo ? `https://image.tmdb.org/t/p/original${logo.file_path}` : "";
        const trailer = details.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        document.getElementById('trailer').value = trailer ? `http://googleusercontent.com/youtube.com/watch?v=${trailer.key}` : "";
        currentCastList = details.credits.cast.slice(0, 12).map(a => ({ name: a.name, img: a.profile_path ? `https://image.tmdb.org/t/p/w200${a.profile_path}` : 'https://via.placeholder.com/100x100' }));
        document.getElementById('cast').value = currentCastList.map(a => a.name).join(", ");
        document.getElementById('vj_genre').value = details.genres.map(g => g.name).join(", ");
        
        document.querySelectorAll('.genre-check').forEach(cb => cb.checked = false);
        details.genres.forEach(g => { 
            const match = categories.find(c => c.toLowerCase() === g.name.toLowerCase()); 
            if(match) document.querySelector(`.genre-check[value="${match}"]`).checked = true; 
        });

        if (searchType === 'tv') {
            document.getElementById('loadingOverlay').style.display = 'flex';
            const epList = document.getElementById('epList');
            epList.innerHTML = '';
            
            for (const s of details.seasons) {
                if (s.season_number === 0) continue;
                const sRes = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s.season_number}?api_key=${TMDB_KEY}`);
                const sData = await sRes.json();
                
                sData.episodes.forEach((ep) => {
                    const epTitle = `S${s.season_number} E${ep.episode_number} - ${ep.name}`;
                    const epImg = ep.still_path ? `https://image.tmdb.org/t/p/w500${ep.still_path}` : document.getElementById('poster').value;
                    const div = document.createElement('div');
                    div.className = 'ep-box';
                    div.innerHTML = `
                        <div style="display:flex; gap:10px; align-items:center;">
                            <img src="${epImg}" style="width:60px; height:40px; border-radius:4px; object-fit:cover;">
                            <div style="flex:1;">
                                <strong>${epTitle}</strong>
                                <input type="text" class="ep-link-input" data-title="${epTitle}" data-img="${epImg}" placeholder="Paste link for this episode" oninput="saveDraft()">
                            </div>
                        </div>`;
                    epList.appendChild(div);
                });
            }
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        saveDraft();
    }

    async function saveData() {
        const docId = document.getElementById('editId').value;
        const currentTitle = document.getElementById('title').value;
        const currentVj = document.getElementById('vj').value;
        if (!docId) {
            const checkQuery = await db.collection("movies").where("title", "==", currentTitle).where("vj", "==", currentVj).get();
            if (!checkQuery.empty) { alert("Already exists!"); return; }
        }
        let seriesEpisodes = [];
        let totalEpisodes = 0;
        let filledEpisodes = 0;
        if(searchType === 'tv') {
            document.querySelectorAll('.ep-link-input').forEach(input => { 
                totalEpisodes++;
                if(input.value.trim() !== "") {
                    filledEpisodes++;
                    seriesEpisodes.push({ 
                        title: input.getAttribute('data-title'), 
                        link: input.value.trim(),
                        poster: input.getAttribute('data-img')
                    }); 
                }
            });
        }
        const payload = {
            title: currentTitle,
            overview: document.getElementById('overview').value,
            cast: document.getElementById('cast').value,
            castList: currentCastList,
            logo: document.getElementById('logo').value,
            trailer: document.getElementById('trailer').value,
            vj: currentVj,
            vj_genre: document.getElementById('vj_genre').value,
            poster: document.getElementById('poster').value,
            banner: document.getElementById('banner').value,
            isFeatured: document.getElementById('isFeatured').checked,
            type: searchType === 'movie' ? 'Movie' : 'Series',
            Episodes: searchType === 'tv' ? JSON.stringify(seriesEpisodes) : "",
            link: document.getElementById('movieLink').value,
            movieLink: document.getElementById('movieLink').value,
            videoUrl: document.getElementById('movieLink').value,
            categories: Array.from(document.querySelectorAll('.genre-check:checked')).map(c => c.value),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        let finalDocId = docId;
        if (docId) {
            await db.collection("movies").doc(docId).set(payload, { merge: true });
        } else {
            const newDoc = await db.collection("movies").add(payload);
            finalDocId = newDoc.id;
        }

        if (searchType === 'tv') {
            if (totalEpisodes > filledEpisodes) {
                await db.collection("upcoming_series").doc(finalDocId).set({
                    title: currentTitle,
                    overview: document.getElementById('overview').value,
                    poster: document.getElementById('poster').value,
                    vjName: currentVj,
                    epFrom: filledEpisodes,
                    epTo: totalEpisodes,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                await db.collection("upcoming_series").doc(finalDocId).delete().catch(() => {});
            }
        }

        localStorage.removeItem('leoxtream_admin_backup');
        alert("Upload Successful!");
        location.reload();
    }
</script>
