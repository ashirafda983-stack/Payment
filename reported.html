<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reported Issues | LeoXtream Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --accent: #00a8ff;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(0, 168, 255, 0.2);
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #004e7a 0%, var(--bg) 70%);
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Advanced UI Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Glass Report Cards */
        .report-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .report-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: var(--danger);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-pill {
            background: rgba(0, 168, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 168, 255, 0.2);
        }

        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .issue-type {
            font-size: 20px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .description-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .btn-resolve { background: var(--success); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        #empty-state {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">Report Center</h1>
            <p style="margin:5px 0 0; color:#64748b; font-size:14px;">Manage user-submitted issues</p>
        </div>
        <a href="admin (1).html" class="back-btn"><i class="fas fa-arrow-left"></i> BACK TO ADMIN</a>
    </div>

    <div id="reportsList">
        <div id="empty-state">
            <i class="fas fa-inbox fa-3x" style="margin-bottom: 15px;"></i>
            <p>Loading reports...</p>
        </div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = { 
        apiKey: "AIzaSyBW6mwoDVbGn0cX7ySV49648jSrLZ_vyEQ", 
        authDomain: "leoxtream-46cdf.firebaseapp.com", 
        projectId: "leoxtream-46cdf", 
        appId: "1:198227069591:web:a86310e5dc58b845abf7d2",
        databaseURL: "https://fnh-fast-vip-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Load Reports from "reports" collection
    function loadReports() {
        db.collection("reports").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const reportsList = document.getElementById('reportsList');
            if (snapshot.empty) {
                reportsList.innerHTML = '<div id="empty-state"><p>No reports found.</p></div>';
                return;
            }

            reportsList.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleString() : 'Just now';
                
                const card = document.createElement('div');
                card.className = 'report-card';
                card.innerHTML = `
                    <div class="user-info-bar">
                        <span><i class="fas fa-user"></i> UID: ${data.userId}</span>
                        <span><i class="fas fa-envelope"></i> ${data.email}</span>
                        <span><i class="fas fa-clock"></i> ${time}</span>
                        <span class="info-pill">${data.status || 'Pending'}</span>
                    </div>
                    <div class="issue-header">
                        <div class="issue-type">${data.type}</div>
                    </div>
                    <div class="description-box">
                        ${data.description}
                    </div>
                    <div class="actions">
                        <button class="btn btn-resolve" onclick="updateStatus('${doc.id}', 'Resolved')">MARK RESOLVED</button>
                        <button class="btn btn-delete" onclick="deleteReport('${doc.id}')">DELETE</button>
                    </div>
                `;
                reportsList.appendChild(card);
            });
        });
    }

    async function updateStatus(id, newStatus) {
        try {
            await db.collection("reports").doc(id).update({ status: newStatus });
            alert("Status updated to " + newStatus);
        } catch (error) {
            alert("Error: " + error.message);
        }
    }

    async function deleteReport(id) {
        if(confirm("Are you sure you want to delete this report?")) {
            try {
                await db.collection("reports").doc(id).delete();
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    }

    window.onload = loadReports;
</script>

</body>
  </html>
